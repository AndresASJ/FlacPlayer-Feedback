name: Bug report
description: Report a reproducible problem in FlacPlayer.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. This issue is public. Do not attach music files, private file paths, account information, tokens, or security-sensitive details.
  - type: input
    id: app_version
    attributes:
      label: FlacPlayer version
      description: Include the version and build number if visible.
      placeholder: "Example: 0.1 (42)"
    validations:
      required: true
  - type: input
    id: device_os
    attributes:
      label: Device and OS version
      placeholder: "Example: iPhone 16 Pro, iOS 19.4"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the problem.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Include screenshots or non-sensitive details only if useful.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I have removed personal, copyrighted, account, and security-sensitive information from this public report.
          required: true
