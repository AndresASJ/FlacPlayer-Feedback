name: Feature request
description: Suggest an improvement or new capability for FlacPlayer.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are public. Explain the listening problem or workflow first so the idea can be evaluated against FlacPlayer's low-friction playback goals.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where this would improve your listening experience.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe how you would expect the feature to work.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Playback
        - Audio output or EQ
        - Library and organization
        - Metadata or artwork
        - User interface
        - Lyrics
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds or alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I have not included private or security-sensitive information in this public request.
          required: true
